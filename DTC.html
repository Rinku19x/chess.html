<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Time Control</title>
</head>
<body>
    <form action="myurl">
        <label for="bday">Birthday(date):</label>
        <input type="date"id="bday"name="bday"><br><br>

        <label for="appt"><Select a Time</label>
        <input type="time"id="appt"name="appt"><br><br>

        <label for="meeting">Meeting Date & Time:</label>
        <input type="datetime-local"id="meeting" name="meeting"><br><br>

        <label for="month">select a Month:</label>
        <input type="month"id="month"name="month"><br><br>

        <label for ="week">Select a Week:</label>
        <input type="week"id="week"name="week"><br><br>

        <label for="limitedDt">Select Accurate Date</label><br><br>
        <input type="date"name="limitedDt"value="2026-04-30"min="2026-04-30"max="2026-12-31">
        
        <input type=""submit"/>
        </form>
</body>
</html>
